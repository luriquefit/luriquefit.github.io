<!DOCTYPE html>
<html lang="pt-br" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LuRique FIT - Área do Aluno</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="css/estilo.css">
  
</head>
<style>
    body{
        background: linear-gradient(to right, #e0f7fa, #f08c2b);
    }
</style>
<body>
    <!-- PRELOADER -->
  <div id="preloader">
    <img src="img/imgflorofc-removebg-preview.png" alt="Flor carregando" class="loader-img">
  </div>
  
  <!-- NAVBAR -->
  <nav class="navbar fixed-top px-3">
    <a class="navbar-brand" data-bs-toggle="offcanvas" href="#mainMenu" role="button" aria-controls="mainMenu">
      <img src="img/imgflorofc-removebg-preview.png" alt="Heart Mascot" />
      <h1>menu</h1>
    </a>
  </nav>
  <!-- OFFCANVAS MENU -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="mainMenu">
    <div class="offcanvas-header border-bottom border-secondary">
      <h5 class="offcanvas-title">Menu</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column pt-4">
      <a href="index.html">Home</a>
      <a id="linkLogin" class="btn btn-outline-light w-auto text-nowrap" href="https://w.app/luriquefit">Contato</a>
    </div>
  </div>
  <div class="container py-5">
    <div
      class="card shadow p-4 mx-auto"
      style="max-width: 500px"
    >
      <h2 class="text-center mb-4">
        Bem-vindo, <span id="userNome"></span> 👋
      </h2>

      <h4>🏋️‍♂️ Seu treino:</h4>
      <p id="treino">Carregando...</p>

      <h4 class="mt-4">💧 Água consumida hoje (200 ml por copo):</h4>
      <p id="agua">0 copos</p>

      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-success flex-fill" onclick="beberAgua()">
          Beber 1 copo (200 ml)
        </button>
        <button class="btn btn-warning flex-fill" onclick="removerAgua()">
          Remover 1 copo
        </button>
      </div>

      <div class="d-grid gap-2 mt-3">
        <button class="btn btn-outline-danger" onclick="logout()">Sair</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
  <script src="js/script.js"></script>
  <script src="js/preloader.js"></script>
  <script>
    // Config Firebase - substitua com seus dados reais
    const firebaseConfig = {
    apiKey: "AIzaSyAE3RAALT8f2A0JG3DOG2X50zEpUIonCq0",
    authDomain: "luriquefit.firebaseapp.com",
    projectId: "luriquefit",
    storageBucket: "luriquefit.firebasestorage.app",
    messagingSenderId: "1077271243747",
    appId: "1:1077271243747:web:001ac1a73d54012d548ed6"
  };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const userRef = db.collection("users").doc(user.uid);

      // Escuta em tempo real atualizações no documento do usuário
      userRef.onSnapshot(doc => {
        if (doc.exists) {
          const dados = doc.data();
          document.getElementById("userNome").textContent = dados.nome || user.email;
          document.getElementById("treino").textContent = dados.treino || "Nenhum treino atribuído ainda.";
          document.getElementById("agua").textContent = `${dados.aguaHoje || 0} copos`;
        } else {
          document.getElementById("userNome").textContent = user.email;
          document.getElementById("treino").textContent = "Usuário sem dados.";
          document.getElementById("agua").textContent = "0 copos";
        }
      });
    });

    function beberAgua() {
      const user = auth.currentUser;
      const userRef = db.collection("users").doc(user.uid);

      userRef.update({
        aguaHoje: firebase.firestore.FieldValue.increment(1)
      }).catch(err => {
        alert("Erro ao atualizar água: " + err.message);
      });
    }

    function removerAgua() {
      const user = auth.currentUser;
      const userRef = db.collection("users").doc(user.uid);

      userRef.get().then(doc => {
        if (doc.exists) {
          const atual = doc.data().aguaHoje || 0;
          if (atual > 0) {
            userRef.update({
              aguaHoje: firebase.firestore.FieldValue.increment(-1)
            }).catch(err => {
              alert("Erro ao atualizar água: " + err.message);
            });
          }
        }
      });
    }

    function logout() {
      auth.signOut().then(() => {
        window.location.href = "login.html";
      });
    }
  </script>
</body>
</html>
