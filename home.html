<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LuRique FIT - Área do Aluno</title>
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/estilo.css" />
  </head>
  <style>
    body {
      background: linear-gradient(to right, #e0f7fa, #f08c2b);
    }
    .garrafinha-wrapper {
      width: 150px;
      height: 400px;
      position: relative;
    }

    .garrafa-base {
      width: 100%;
      height: auto;
      display: block;
    }

    .garrafa-nivel {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #00bfff; /* cor da água */
      z-index: 1;
      transition: height 0.3s ease;
    }
  </style>
  <body>
    <!-- PRELOADER -->
    <div id="preloader">
      <img
        src="img/imgflorofc-removebg-preview.png"
        alt="Flor carregando"
        class="loader-img"
      />
    </div>

    <!-- NAVBAR -->
    <nav class="navbar fixed-top px-3">
      <a
        class="navbar-brand"
        data-bs-toggle="offcanvas"
        href="#mainMenu"
        role="button"
        aria-controls="mainMenu"
      >
        <img src="img/imgflorofc-removebg-preview.png" alt="Heart Mascot" />
        <h1>menu</h1>
      </a>
    </nav>
    <!-- OFFCANVAS MENU -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mainMenu">
      <div class="offcanvas-header border-bottom border-secondary">
        <h5 class="offcanvas-title">Menu</h5>
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body d-flex flex-column pt-4">
        <a href="index.html">Home</a>
        <a
          id="linkLogin"
          class="btn btn-outline-light w-auto text-nowrap"
          href="https://w.app/luriquefit"
          >Contato</a
        >
      </div>
    </div>
    <div class="container py-5">
      <div class="card shadow p-4 mx-auto" style="max-width: 500px">
        <h2 class="text-center mb-4">
          Bem-vindo, <span id="userNome"></span> 👋
        </h2>

        <h4>🏋️‍♂️ Treino:</h4>
        <a id="btnTreino" href="#" class="btn btn-primary">Baixar PDF</a>

        <div class="garrafinha-container text-center my-5">
          <h3>Quantos ml você já bebeu hoje?</h3>

          <!-- Imagem da garrafa com efeito visual -->
          <div class="garrafinha-wrapper position-relative mx-auto z-3">
            <img src="img/garrafa.png" alt="Garrafinha" class="img-fluid" />
            <div class="garrafa-nivel" id="nivelGarrafa"></div>
          </div>

          <!-- Slider -->
          <input
            type="range"
            id="sliderAgua"
            min="0"
            max="3000"
            step="200"
            value="0"
            class="form-range mt-4"
            style="width: 80%"
          />
          <p class="mt-2">
            <strong><span id="valorAgua">0</span> ml</strong> de 3000 ml
          </p>
        </div>

        <div class="d-grid gap-2 mt-3">
          <button class="btn btn-outline-danger" onclick="logout()">
            Sair
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/preloader.js"></script>
    <script src="js/home.js"></script>
  </body>
</html>
